<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — আমাদের পরিবার</title>
  <link rel="icon" type="image/png" href="assets/images/fav.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="bootstrap-5.3.8-dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <div class="login-ornament">✦</div>
    <h2>Admin Panel</h2>
    <p class="login-sub">আমাদের পরিবার</p>
    <div class="login-field">
      <input
        type="password"
        id="passwordInput"
        class="form-control-dark"
        placeholder="পাসওয়ার্ড দিন"
        onkeydown="if(event.key==='Enter') checkPassword()"
        autocomplete="current-password"
      >
    </div>
    <button class="login-btn" onclick="checkPassword()">প্রবেশ করুন</button>
    <div id="loginError" class="login-error"></div>
    <a href="index.html" class="login-back">← মূল সাইটে ফিরুন</a>
  </div>
</div>

<!-- Admin Panel -->
<div id="adminPanel" style="display:none">

  <header class="admin-header">
    <div class="d-flex align-items-center gap-2">
      <a href="index.html" class="back-btn">← মূল সাইট</a>
      <h1 class="mb-0">Admin Panel</h1>
    </div>
    <div class="d-flex gap-2">
      <button class="download-btn" onclick="downloadJSON()">⬇ JSON</button>
      <button class="logout-btn" onclick="logout()">বের হন</button>
    </div>
  </header>

  <div class="admin-wrapper">

    <!-- Stats -->
    <div id="statsBar" class="stats-bar mb-3"></div>

    <!-- 4 Action Buttons -->
    <div class="action-row">
      <button class="action-card add-action" onclick="openForm(null)">
        <span class="action-icon">＋</span>
        <span class="action-label">নতুন যোগ</span>
      </button>
      <button class="action-card edit-action" onclick="focusSearch('edit')">
        <span class="action-icon">✎</span>
        <span class="action-label">এডিট</span>
      </button>
      <button class="action-card delete-action" onclick="focusSearch('delete')">
        <span class="action-icon">✕</span>
        <span class="action-label">মুছুন</span>
      </button>
      <button class="action-card photo-action" onclick="focusSearch('photo')">
        <span class="action-icon">🖼</span>
        <span class="action-label">ছবির নাম</span>
      </button>
    </div>

    <!-- Search -->
    <div class="search-box mt-3">
      <div id="searchModeLabel" class="search-mode-label"></div>
      <input
        type="text"
        id="searchInput"
        class="search-input"
        placeholder="নাম লিখে খুঁজুন..."
        oninput="searchPerson()"
        autocomplete="off"
      >
      <div id="searchResults" class="search-results"></div>
    </div>

  </div>
</div>

<!-- Edit/Add Modal -->
<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content edit-modal">
      <div class="modal-header">
        <h5 id="editModalTitle" class="modal-title">ব্যক্তি সম্পাদনা</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="editModalBody"></div>
      <div class="modal-footer">
        <button class="save-btn" onclick="savePerson()">✓ সেভ করুন</button>
        <button class="cancel-btn" data-bs-dismiss="modal">বাতিল</button>
        <button class="delete-btn" id="deleteBtn" onclick="confirmDelete()">✕ মুছুন</button>
      </div>
    </div>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content edit-modal">
      <div class="modal-header">
        <h5 class="modal-title" style="color:var(--danger)">⚠ নিশ্চিত করুন</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p id="deleteConfirmText" style="font-size:0.95rem;color:var(--text-primary)"></p>
        <p style="font-size:0.8rem;color:var(--text-muted);margin-top:8px">
          এই ব্যক্তিকে মুছলে সব সম্পর্ক থেকেও সরে যাবে।
        </p>
      </div>
      <div class="modal-footer">
        <button class="delete-btn" onclick="deletePerson()">হ্যাঁ, মুছুন</button>
        <button class="cancel-btn" data-bs-dismiss="modal">না, রাখুন</button>
      </div>
    </div>
  </div>
</div>

<!-- Photo Info Modal -->
<div class="modal fade" id="photoModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content edit-modal">
      <div class="modal-header">
        <h5 class="modal-title">🖼 ছবির তথ্য</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="photoModalBody"></div>
      <div class="modal-footer">
        <button class="save-btn" onclick="goEditFromPhoto()">✎ এডিট করুন</button>
        <button class="cancel-btn" data-bs-dismiss="modal">বন্ধ করুন</button>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="adminToast" class="toast-custom"></div>

<script src="bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="js/admin.js"></script>
</body>
</html>
